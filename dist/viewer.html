<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DocBook -> Markdown Viewer</title>
    <style>
      /* Theme Variables */
      :root {
        --bg-color: #ffffff;
        --text-color: #333333;
        --border-color: #dddddd;
        --btn-bg: #ffffff;
        --btn-hover: #f0f0f0;
        --code-bg: #f3f3f3;
        --pre-bg: #f6f8fa;
        --link-color: #0b57d0;
        --blockquote-border: #dfe2e5;
        --blockquote-text: #6a737d;
        --msg-color: #555555;
        --tab-inactive: #f9f9f9;
        
        /* Error Box Light Theme */
        --error-bg: #fef2f2;
        --error-border: #f87171;
        --error-text: #991b1b;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg-color: #1e1e1e;
          --text-color: #d4d4d4;
          --border-color: #444444;
          --btn-bg: #2d2d2d;
          --btn-hover: #3d3d3d;
          --code-bg: #2d2d2d;
          --pre-bg: #252525;
          --link-color: #5ea5fa;
          --blockquote-border: #555555;
          --blockquote-text: #999999;
          --msg-color: #aaaaaa;
          --tab-inactive: #252525;
          
          /* Error Box Dark Theme */
          --error-bg: #450a0a;
          --error-border: #dc2626;
          --error-text: #fca5a5;
        }
      }

      body { 
        font-family: system-ui, sans-serif; 
        padding: 24px; 
        background-color: var(--bg-color); 
        color: var(--text-color); 
      }
      header { display: grid; gap: 10px; margin-bottom: 12px; }
      .meta { display: grid; gap: 4px; }
      .meta a { color: var(--link-color); text-decoration: none; word-break: break-all; }
      .actions { display: flex; flex-wrap: wrap; gap: 8px; }
      .options { display: flex; gap: 16px; margin-top: 8px; font-size: 14px; flex-wrap: wrap;}
      .options label { display: flex; align-items: center; gap: 4px; cursor: pointer; }
      
      button { 
        padding: 8px 12px; border-radius: 8px; 
        border: 1px solid var(--border-color); 
        background: var(--btn-bg); color: var(--text-color);
        cursor: pointer; font-size: 13px; 
      }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      button:hover:not(:disabled) { background: var(--btn-hover); }
      
      #msg { margin: 8px 0 12px; color: var(--msg-color); font-size: 14px; }
      
      /* Error Box CSS */
      #errorBox {
        display: none;
        background-color: var(--error-bg);
        border: 1px solid var(--error-border);
        color: var(--error-text);
        padding: 16px 20px;
        border-radius: 8px;
        margin-bottom: 16px;
        line-height: 1.5;
      }
      #errorBox h2 { margin: 0 0 8px 0; font-size: 18px; color: inherit; }
      #errorBox p { margin: 0; font-size: 14px; }
      #errorBox code { background: rgba(0,0,0,0.1); padding: 2px 4px; border-radius: 4px; }

      /* Tabs CSS */
      .tabs { display: flex; gap: 2px; margin-bottom: -1px; }
      .tab-btn { 
        border-radius: 8px 8px 0 0; 
        border: 1px solid var(--border-color); border-bottom: none; 
        background: var(--tab-inactive); padding: 8px 16px; margin-bottom: 0; 
      }
      .tab-btn.active { 
        background: var(--bg-color); font-weight: bold; 
        position: relative; z-index: 1; 
        border-bottom: 2px solid var(--bg-color); 
      }
      
      /* Content Area CSS */
      .content-area { border: 1px solid var(--border-color); border-radius: 0 8px 8px 8px; background: var(--bg-color); position: relative; }
      #out, #previewFrame { width: 100%; height: 65vh; box-sizing: border-box; padding: 16px; overflow-y: auto; }
      #out { 
        border: none; background: var(--bg-color); color: var(--text-color);
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; 
        font-size: 13px; resize: vertical; border-radius: 0 0 8px 8px; outline: none; 
      }
      
      /* Helper to hide UI on fatal error */
      .hidden-on-error { display: block; }
    </style>
    <script type="module" crossorigin src="/assets/viewer-C9djaEMd.js"></script>
  </head>
  <body>
    <header>
      <h1>DocBook -> Markdown</h1>

      <div class="meta hidden-on-error">
        <div id="title" style="font-weight: bold; font-size: 18px;"></div>
        <a id="url" href="#" target="_blank" rel="noreferrer"></a>
      </div>

      <div class="actions hidden-on-error">
        <button id="copyMd" disabled>Copy Markdown</button>
        <button id="downloadMd" disabled>Download .md</button>
        <button id="copyUrl" disabled>Copy Source URL</button>
        <button id="clear" disabled>Clear Session Data</button>
      </div>

      <div class="options hidden-on-error">
        <label><input type="checkbox" id="stripLinks" /> Strip Links (Keep Text)</label>
        <label><input type="checkbox" id="stripTables" /> Remove HTML Tables</label>
      </div>
    </header>

    <div id="errorBox">
      <h2 id="errorTitle">Error</h2>
      <p id="errorDesc">Something went wrong.</p>
    </div>

    <p id="msg" class="hidden-on-error">Loading…</p>

    <div class="tabs hidden-on-error">
      <button id="tabMd" class="tab-btn active">Markdown</button>
      <button id="tabPreview" class="tab-btn">Preview</button>
    </div>
    
    <div class="content-area hidden-on-error">
      <textarea id="out" spellcheck="false"></textarea>
      <iframe
        id="previewFrame"
        sandbox="allow-popups allow-popups-to-escape-sandbox"
        style="display:none; width:100%; height:65vh; border:0;"
      ></iframe>
    </div>

  </body>
</html>
